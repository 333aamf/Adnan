<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Ceramics | WhatsApp Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --bg: #f4f4f4; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: white; align-items: center; }
        .lang-btn { cursor: pointer; border: 1px solid var(--gold); background: none; color: var(--gold); padding: 5px 15px; border-radius: 5px; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .request-btn { background: var(--gold); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Modal / Form Overlay */
        #form-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .form-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        label { font-size: 14px; color: #666; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 20px;">ELITE CERAMICS</div>
    <button class="lang-btn" onclick="toggleLang()" id="langSwitcher">عربي</button>
</nav>

<div class="grid" id="product-list"></div>

<div id="form-overlay">
    <div class="form-card">
        <h2 id="form-title">Request Sample</h2>
        <label id="lbl-name">Your Name</label>
        <input type="text" id="cust-name" placeholder="Enter your name">
        
        <label id="lbl-prod">Product</label>
        <input type="text" id="cust-prod" readonly style="background: #eee;">
        
        <button class="request-btn" onclick="sendToWhatsApp()" id="send-btn">Send to WhatsApp</button>
        <button onclick="closeForm()" style="background:none; border:none; color:#999; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    // 1. YOUR DATA
    const data = {
        phone: "966500000000", // CHANGE THIS to your client's WhatsApp number
        en: {
            btn: "Request Sample",
            formTitle: "Sample Inquiry",
            lblName: "Your Name",
            lblProd: "Selected Product",
            send: "Send via WhatsApp",
            items: [
                { name: "Carrara White", desc: "Classic Italian Marble", img: "https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?w=400" },
                { name: "Royal Slate", desc: "Durable grey stone", img: "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?w=400" }
            ]
        },
        ar: {
            btn: "اطلب عينة",
            formTitle: "طلب عينة",
            lblName: "الاسم",
            lblProd: "المنتج المختار",
            send: "إرسال عبر واتساب",
            items: [
                { name: "رخام كاريرا", desc: "رخام إيطالي كلاسيكي", img: "https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?w=400" },
                { name: "سليت ملكي", desc: "حجر رمادي متين", img: "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?w=400" }
            ]
        }
    };

    let currentLang = 'en';

    function renderItems() {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        data[currentLang].items.forEach(item => {
            list.innerHTML += `
                <div class="card">
                    <img src="${item.img}">
                    <div class="card-content">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <button class="request-btn" onclick="openForm('${item.name}')">${data[currentLang].btn}</button>
                    </div>
                </div>
            `;
        });
    }

    function openForm(productName) {
        document.getElementById('cust-prod').value = productName;
        document.getElementById('form-title').innerText = data[currentLang].formTitle;
        document.getElementById('lbl-name').innerText = data[currentLang].lblName;
        document.getElementById('lbl-prod').innerText = data[currentLang].lblProd;
        document.getElementById('send-btn').innerText = data[currentLang].send;
        document.getElementById('form-overlay').style.display = 'flex';
    }

    function closeForm() { document.getElementById('form-overlay').style.display = 'none'; }

    function sendToWhatsApp() {
        const name = document.getElementById('cust-name').value;
        const prod = document.getElementById('cust-prod').value;
        if(!name) return alert("Please enter your name");

        const message = currentLang === 'en' 
            ? `Hello, my name is ${name}. I am interested in a sample of: ${prod}`
            : `مرحباً، اسمي ${name}. أنا مهتم بالحصول على عينة من: ${prod}`;
        
        const url = `https://wa.me/${data.phone}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    function toggleLang() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langSwitcher').innerText = currentLang === 'en' ? 'عربي' : 'English';
        renderItems();
    }

    renderItems();
</script>
</body>
</html>
